<!DOCTYPE html>
<html lang="en">
<head>
  <title>Listing with a base tag</title>
  <base href="https://example.com/docs/v2/">
</head>
<body>
  <!-- Relative links must resolve against the <base href>, not the seed URL. -->
  <a href="manual-a.pdf">Manual A</a>
  <a href="guides/manual-b.pdf">Manual B</a>
</body>
</html>
